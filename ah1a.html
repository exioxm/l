<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Red Button</title>
    <style>
        :root {
            --neon-red: #ff0033;
            --neon-glow: rgba(255, 0, 51, 0.6);
            --black-base: #111;
        }

        body, html {
            height: 100%; margin: 0;
            background-color: #050505; color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; user-select: none;
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Menu Styles */
        h1 {
            font-size: 3rem; letter-spacing: 10px;
            color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red);
            margin-bottom: 40px; text-align: center;
        }

        .play-btn {
            background: transparent; color: white;
            border: 2px solid var(--neon-red); padding: 15px 60px;
            font-size: 1.5rem; cursor: pointer; border-radius: 4px;
            transition: 0.3s; box-shadow: 0 0 10px var(--neon-glow);
        }

        .play-btn:hover {
            background: var(--neon-red); box-shadow: 0 0 30px var(--neon-red);
        }

        /* Button Styles */
        .container { position: relative; width: 220px; height: 240px; }
        .black-bottom {
            position: absolute; bottom: 0;
            width: 220px; height: 80px;
            background: var(--black-base); border-radius: 20px;
            border-bottom: 10px solid #000;
        }
        #red-button {
            position: absolute; top: 0; left: 10px;
            width: 200px; height: 150px;
            background: var(--neon-red); border: none;
            border-radius: 15px; cursor: pointer;
            box-shadow: 0 15px 0 #800, 0 0 30px var(--neon-glow);
            transition: transform 0.05s; outline: none;
        }
        #red-button:active { transform: translateY(12px); box-shadow: 0 3px 0 #500; }

        /* Success Screen Styles */
        #success-text { font-size: 2.5rem; margin-bottom: 20px; color: #fff; }
        #timer { font-size: 4rem; color: var(--neon-red); font-weight: bold; }
    </style>
</head>
<body>

    <!-- Screen 1: Menu -->
    <div id="menu-screen" class="screen active">
        <h1>SYSTEM READY</h1>
        <button class="play-btn" onclick="initGame()">PLAY</button>
    </div>

    <!-- Screen 2: The Button -->
    <div id="game-screen" class="screen">
        <div class="container">
            <div class="black-bottom"></div>
            <button id="red-button"></button>
        </div>
    </div>

    <!-- Screen 3: Nice Computer -->
    <div id="success-screen" class="screen">
        <div id="success-text">Nice Computer!</div>
        <div id="timer">5</div>
    </div>

    <script>
        let audioCtx = null;

        // Sound Generator
        function createSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Sequence Player
        async function playSequence(times) {
            for (let i = 0; i < times; i++) {
                createSound();
                await new Promise(res => setTimeout(res, 500));
            }
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Action: Play Menu
        function initGame() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            switchScreen('game-screen');
            playSequence(2); // Thump twice (0.5s apart)
        }

        // Action: Press Red Button
        document.getElementById('red-button').addEventListener('mousedown', async () => {
            switchScreen('success-screen');
            startTimer();
            await playSequence(3); // Thump 3 times (0.5s apart)
        });

        // Timer Logic
        function startTimer() {
            let timeLeft = 5;
            const timerDisplay = document.getElementById('timer');
            const interval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    // Optional: Reset game after timer hits 0
                    setTimeout(() => { location.reload(); }, 1500);
                }
            }, 1000);
        }
    </script>
</body>
</html>
