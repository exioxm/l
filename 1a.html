<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Red Button</title>
    <style>
        :root {
            --neon-red: #ff3131;
            --deep-red: #8b0000;
            --metal: #2a2a2a;
            --metal-shine: #555555;
        }

        body, html {
            height: 100%; margin: 0;
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
        }

        /* Screen Management */
        .screen { display: none; flex-direction: column; align-items: center; }
        .active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Menu Design */
        #menu-screen h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            color: var(--neon-red);
            text-shadow: 0 0 15px var(--neon-red);
            margin-bottom: 50px;
        }

        .start-btn {
            background: none;
            color: white;
            border: 1px solid white;
            padding: 12px 60px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 3px;
        }

        .start-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px white;
        }

        /* 3D Button Construction */
        .button-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex; justify-content: center; align-items: center;
        }

        /* Metallic Base */
        .metal-base {
            position: absolute;
            bottom: 20px;
            width: 260px;
            height: 100px;
            background: linear-gradient(to bottom, var(--metal-shine), var(--metal), #000);
            border-radius: 50%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }

        /* The Red Top (Neon/Cylinder) */
        #game-button {
            position: absolute;
            top: 20px;
            width: 200px;
            height: 160px;
            background: radial-gradient(circle at top, var(--neon-red), var(--deep-red));
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 
                0 15px 0 #600,
                0 20px 30px rgba(255, 0, 0, 0.2);
            transition: all 0.05s;
            outline: none;
            z-index: 2;
        }

        #game-button:active {
            transform: translateY(12px);
            box-shadow: 
                0 3px 0 #400,
                0 0 40px var(--neon-red);
        }

    </style>
</head>
<body>

    <!-- Main Menu Screen -->
    <div id="menu-screen" class="screen active">
        <h1>AUTHENTICATE</h1>
        <button class="start-btn" onclick="startGame()">INITIALIZE</button>
    </div>

    <!-- Button Game Screen -->
    <div id="game-screen" class="screen">
        <div class="button-wrapper">
            <div class="metal-base"></div>
            <button id="game-button"></button>
        </div>
    </div>

    <script>
        let audioCtx = null;
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const btn = document.getElementById('game-button');

        function startGame() {
            // Unlocks audio for modern browsers
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            menuScreen.classList.remove('active');
            gameScreen.classList.add('active');
        }

        function playThump() {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // A deep, satisfying click/thump sound
            osc.type = 'sine';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        btn.addEventListener('mousedown', () => playThump());
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playThump();
        });
    </script>
</body>
</html>
