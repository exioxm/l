<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Red Button</title>
    <style>
        :root {
            --neon-red: #ff0033;
            --neon-glow: #ff0033aa;
            --black-base: #1a1a1a;
        }

        body, html {
            height: 100%; margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Screen Management */
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; animation: fadeIn 0.5s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Enhanced Main Menu */
        #menu-screen h1 {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 40px;
            color: var(--neon-red);
            text-shadow: 0 0 20px var(--neon-glow);
        }

        .start-btn {
            background: transparent;
            color: white;
            border: 2px solid var(--neon-red);
            padding: 15px 50px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .start-btn:hover {
            background: var(--neon-red);
            box-shadow: 0 0 30px var(--neon-red);
            transform: scale(1.1);
        }

        /* Neon Button Design */
        .button-container {
            position: relative;
            width: 220px;
            height: 240px;
        }

        /* The Black Bottom */
        .button-base {
            position: absolute;
            bottom: 0;
            width: 220px;
            height: 100px;
            background: var(--black-base);
            border-radius: 20px;
            border-bottom: 8px solid #000;
        }

        /* The Neon Red Top */
        #game-button {
            position: absolute;
            top: 0; left: 10px;
            width: 200px;
            height: 140px;
            background: var(--neon-red);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 
                0 15px 0 #900, 
                0 0 25px var(--neon-glow);
            transition: all 0.05s;
            outline: none;
        }

        #game-button:active {
            transform: translateY(12px);
            box-shadow: 
                0 3px 0 #600, 
                0 0 50px var(--neon-red);
        }

    </style>
</head>
<body>

    <!-- Main Menu -->
    <div id="menu-screen" class="screen active">
        <h1>System Active</h1>
        <button class="start-btn" onclick="startGame()">ENTER TERMINAL</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="button-container">
            <div class="button-base"></div>
            <button id="game-button"></button>
        </div>
    </div>

    <script>
        let audioCtx = null;
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const btn = document.getElementById('game-button');

        function startGame() {
            // Unlock Audio Context for 2026 browser standards
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            menuScreen.classList.remove('active');
            gameScreen.classList.add('active');
        }

        function playNeonSound() {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // A punchy, electronic click sound
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        btn.addEventListener('mousedown', () => {
            playNeonSound();
        });

        // Optional: Trigger sound on touch for mobile devices
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playNeonSound();
        });
    </script>
</body>
</html>
