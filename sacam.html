<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Button Game</title>
    <style>
        body, html {
            height: 100%; margin: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #222; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Screen Management */
        .screen { display: none; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* Menu Styles */
        h1 { font-size: 48px; color: red; margin-bottom: 30px; }
        .menu-btn {
            padding: 15px 40px; font-size: 20px; cursor: pointer;
            background: white; border: none; border-radius: 5px;
            font-weight: bold; transition: 0.2s;
        }
        .menu-btn:hover { background: #ccc; transform: scale(1.05); }

        /* Game Styles */
        #score-container { font-size: 40px; margin-bottom: 20px; }
        #game-button {
            background-color: red; color: white; border: none;
            width: 200px; height: 200px; font-size: 24px; font-weight: bold;
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 10px #900; transition: 0.1s;
        }
        #game-button:active {
            box-shadow: 0 3px #600; transform: translateY(7px);
        }
    </style>
</head>
<body>

    <!-- Main Menu Screen -->
    <div id="menu-screen" class="screen active">
        <h1>RED BUTTON</h1>
        <button class="menu-btn" onclick="startGame()">START GAME</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div id="score-container">Score: <span id="score">0</span></div>
        <button id="game-button">PUSH</button>
    </div>

    <script>
        let count = 0;
        let audioCtx = null;

        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const scoreSpan = document.getElementById('score');
        const btn = document.getElementById('game-button');

        function startGame() {
            // Initialize Audio Context (Browser requirement)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Switch screens
            menuScreen.classList.remove('active');
            gameScreen.classList.add('active');
        }

        // Professional Sound Generator (No Base64 needed, works every time)
        function playSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square'; // Retro "beep" sound
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 note
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        btn.addEventListener('click', () => {
            count++;
            scoreSpan.textContent = count;
            playSound();
        });
    </script>
</body>
</html>
